# Configuration Fly.io — backend NestJS (BrightSchool)
# ⚠️ "app" doit être unique sur tout Fly.io : change-le si le nom est déjà pris.
app = "gestion-ecole-primaire"
primary_region = "cdg"   # Paris. Autres : "ams" (Amsterdam), "jnb" (Johannesburg)

[build]

# Variables NON sensibles (les secrets — mots de passe, JWT_SECRET — via `fly secrets set`)
[env]
  NODE_ENV = "production"
  PORT = "8080"
  JWT_EXPIRES_IN = "30m"
  DB_SSL = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = false   # ne pas éteindre
  min_machines_running = 1     # reste allumé -> pas de cold-start

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
