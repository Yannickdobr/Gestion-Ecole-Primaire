# fly.toml app configuration file generated for gestion-ecole-primaire on 2026-07-05T09:17:23+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'gestion-ecole-primaire'
primary_region = 'cdg'

[build]

[env]
  DB_SSL = 'true'
  JWT_EXPIRES_IN = '30m'
  NODE_ENV = 'production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
